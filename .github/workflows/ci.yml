name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend
        working-directory: tasksmanagement-backend/taskmanagement
        run: mvn -B clean verify

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tasksmanagement-frontend/package-lock.json

      - name: Build frontend
        working-directory: tasksmanagement-frontend
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker build -t task-backend ./tasksmanagement-backend/taskmanagement
          docker build -t task-frontend ./tasksmanagement-frontend
          